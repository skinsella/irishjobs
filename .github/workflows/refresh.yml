name: Refresh data + redeploy

# When to run:
#   • Monthly (1st of each month, 06:00 UTC) — covers CSO LFS quarterly
#     releases and catches an annual NSB update without surprise.
#   • On every push to main (manual edits to the parser still need to
#     rebuild and redeploy the static site).
#   • On manual workflow_dispatch.
on:
  schedule:
    - cron: '0 6 1 * *'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'update.py'
      - 'site/index.html'
      - '.github/workflows/refresh.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full rebuild (ignore caches)'
        required: false
        default: 'false'

permissions:
  contents: write   # we commit refreshed data back to main
  pages: write
  id-token: write

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            uv run python update.py --force
          else
            uv run python update.py
          fi

      - name: Show summary
        run: |
          echo "## Pipeline output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Occupations indexed:** $(python -c 'import json;print(len(json.load(open("occupations.json"))))')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pages rendered:**     $(ls pages | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "**CSV rows:**           $(($(wc -l < occupations.csv) - 1))" >> "$GITHUB_STEP_SUMMARY"
          echo "**Site data bytes:**    $(wc -c < site/data.json)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f scores.json ]; then
            echo "**Scored occupations:** $(python -c 'import json;print(len(json.load(open("scores.json"))))')" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed artefacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw/ occupations.json occupations.csv pages/ site/data.json scores.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No artefact changes to commit."
            exit 0
          fi
          git commit -m "auto-update: refresh NSB + CSO + site data"
          git push

      - name: Upload site/ as Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
